version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: testgen
      POSTGRES_PASSWORD: testgen_pass
      POSTGRES_DB: testgen_poc
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testgen"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://testgen:testgen_pass@postgres:5432/testgen_poc
      DB_SSL_MODE: disable
      UPLOAD_DIR: /app/uploads
      FAISS_INDEX_PATH: /app/faiss_index
    volumes:
      - uploads_data:/app/uploads
      - faiss_data:/app/faiss_index
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
  faiss_data:
